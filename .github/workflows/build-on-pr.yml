name: Build On PR

on:
  pull_request:
    branches: ["master"]
  merge_group:

permissions:
  contents: read

jobs:
  setup-game-dlls:
    uses: ./.github/workflows/setup-game-dlls.yml
    secrets:
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

  build:
    needs: setup-game-dlls
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download game DLLs artifact
        uses: actions/download-artifact@v4
        with:
          name: game-dlls
          path: ~/bits-and-bops/Bits & Bops_Data/Managed

      - name: Create BopSubtitleReader.user.props
        run: |
          mkdir -p BopSubtitleReader
          cat > BopSubtitleReader/BopSubtitleReader.user.props << 'EOF'
          <Project>
            <PropertyGroup>
              <GameRoot>$HOME/bits-and-bops</GameRoot>
            </PropertyGroup>
          </Project>
          EOF

      - name: Restore
        run: dotnet restore BopSubtitleReader.sln

      - name: Build
        run: dotnet build BopSubtitleReader.sln -c Release --no-restore
